services:
  mysql:
    image: mysql:8.4
    container_name: stepwong-web-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: stepwong_web
      MYSQL_USER: stepwong
      MYSQL_PASSWORD: stepwong123
      MYSQL_ROOT_PASSWORD: root123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - stepwong_mysql_data:/var/lib/mysql

volumes:
  stepwong_mysql_data:
