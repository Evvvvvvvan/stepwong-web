server.port=18080

spring.application.name=stepwong-web
spring.datasource.url=jdbc:mysql://localhost:3306/stepwong_web?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai

spring.thymeleaf.cache=false

app.crypto.secret=${APP_CRYPTO_SECRET:change-this-secret-at-least-32-chars}
app.scheduler.zone-id=${APP_SCHEDULER_ZONE:Asia/Shanghai}
app.zepp.timeout-seconds=${APP_ZEPP_TIMEOUT_SECONDS:15}

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
app.zepp.ssl-trust-all=true
