<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Stepwong Web</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-body">
<div class="auth-card">
    <div class="brand">Stepwong Web</div>
    <h1>登录</h1>
    <p class="muted">账号隔离存储，登录后只能访问当前账号创建的数据。</p>

    <div class="alert success" th:if="${success}" th:text="${success}"></div>
    <div class="alert success" th:if="${param.logout}">已退出登录</div>
    <div class="alert error" th:if="${param.error}">账号或密码错误</div>

    <form th:action="@{/login}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label>
            <span>登录账号</span>
            <input type="text" name="username" autocomplete="username" required>
        </label>
        <label>
            <span>登录密码</span>
            <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <label class="checkbox-line">
            <input type="checkbox" name="remember-me">
            <span>7 天内保持登录</span>
        </label>
        <button class="primary" type="submit">登录</button>
    </form>

    <div class="auth-link">
        没有账号？<a th:href="@{/register}">立即注册</a>
    </div>
</div>
</body>
</html>
